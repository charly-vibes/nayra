<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nayra - Timeline Visualization</title>
  <meta name="description" content="Nayra — a high-performance timeline visualization tool. Named after the Aymara word for 'eye' and 'past': face the past, see what is known.">
  <meta name="theme-color" content="#1a1a2e">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: system-ui, -apple-system, sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
    }
    #app {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
    }
    #timeline-container {
      flex: 1;
      position: relative;
    }
    #timeline-canvas {
      display: block;
      width: 100%;
      height: 100%;
      outline: none; /* Remove default focus outline, we handle focus visually in the canvas */
    }
    #timeline-canvas:focus {
      /* Optional: Add a subtle focus indicator */
      box-shadow: inset 0 0 0 2px rgba(0, 217, 255, 0.3);
    }
    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border-width: 0;
    }
    /* Skip navigation links — visible on focus (WCAG 2.4.1) */
    .skip-link:focus {
      position: absolute !important;
      left: 0 !important;
      width: auto !important;
      height: auto !important;
      overflow: visible !important;
      z-index: 9999;
    }
  </style>
</head>
<body>
  <a href="#timeline-canvas" class="sr-only skip-link">Skip to timeline</a>
  <div id="app" role="application" aria-label="Nayra timeline visualization">
    <header class="sr-only">
      <h1>Nayra — Timeline Visualization</h1>
      <p>Interactive timeline. Use keyboard shortcuts: ? for help, / for search, Tab to navigate events.</p>
    </header>
    <main id="timeline-container">
      <canvas id="timeline-canvas" tabindex="0" role="img" aria-label="Interactive timeline visualization. Use arrow keys to pan, +/- to zoom, Tab to navigate events, ? for help."></canvas>
    </main>
    <!-- ARIA live region for screen reader announcements -->
    <div id="aria-live" class="sr-only" role="status" aria-live="polite" aria-atomic="true"></div>
  </div>
  <script id="nayra-app" type="module" src="src/main.js"></script>
  <script>
    // Early feature detection — runs as a classic (non-module) script BEFORE the
    // ES-module graph is evaluated, so it can block loading when BigInt / Canvas /
    // IndexedDB are absent.  The module script above is type="module" and therefore
    // deferred; this classic script executes first.
    (function () {
      var missing = [];
      if (typeof BigInt === 'undefined') missing.push('bigint');
      try {
        var c = document.createElement('canvas');
        if (!c.getContext('2d')) missing.push('canvas');
      } catch (_) { missing.push('canvas'); }
      if (typeof indexedDB === 'undefined' || indexedDB === null) missing.push('indexeddb');

      if (missing.length === 0) return; // all good — let the module load

      // Prevent the module from executing (it would crash calling BigInt())
      var appScript = document.getElementById('nayra-app');
      if (appScript) appScript.remove();

      // Feature labels for the error UI
      var labels = { canvas: 'Canvas 2D API', bigint: 'BigInt', indexeddb: 'IndexedDB' };

      // Build a self-contained error overlay (mirrors src/ui/browser-error.js)
      var overlay = document.createElement('div');
      overlay.setAttribute('role', 'alert');
      overlay.setAttribute('aria-live', 'assertive');
      overlay.setAttribute('aria-atomic', 'true');
      overlay.setAttribute('tabindex', '-1');
      var os = overlay.style;
      os.position = 'fixed'; os.inset = '0'; os.display = 'flex';
      os.alignItems = 'center'; os.justifyContent = 'center';
      os.background = '#1a1a2e'; os.color = '#e0e0e0';
      os.fontFamily = 'system-ui, -apple-system, sans-serif';
      os.zIndex = '9999'; os.padding = '2rem';

      var card = document.createElement('div');
      var cs = card.style;
      cs.maxWidth = '480px'; cs.width = '100%'; cs.background = '#2a2a3e';
      cs.border = '1px solid #4a4a6a'; cs.borderRadius = '12px';
      cs.padding = '2rem'; cs.textAlign = 'center';

      var icon = document.createElement('div');
      icon.textContent = '\u26A0\uFE0F';
      icon.setAttribute('aria-hidden', 'true');
      icon.style.fontSize = '3rem'; icon.style.marginBottom = '1rem';

      var title = document.createElement('h2');
      title.textContent = 'Browser Not Supported';
      var ts = title.style;
      ts.fontSize = '1.5rem'; ts.fontWeight = '700'; ts.color = '#ff6b6b';
      ts.marginBottom = '0.75rem';

      var message = document.createElement('p');
      message.textContent = 'Nayra requires the following browser features that are not available:';
      var ms = message.style;
      ms.color = '#b0b0c8'; ms.marginBottom = '1.25rem'; ms.lineHeight = '1.5';

      card.appendChild(icon);
      card.appendChild(title);
      card.appendChild(message);

      var list = document.createElement('ul');
      list.setAttribute('aria-label', 'Missing browser features');
      var ls = list.style;
      ls.listStyle = 'none'; ls.margin = '0 0 1.5rem'; ls.padding = '0'; ls.textAlign = 'left';

      for (var i = 0; i < missing.length; i++) {
        var item = document.createElement('li');
        var is = item.style;
        is.display = 'flex'; is.alignItems = 'center'; is.gap = '0.5rem';
        is.padding = '0.4rem 0.75rem'; is.background = '#1a1a2e';
        is.borderRadius = '6px'; is.marginBottom = '0.4rem';
        is.fontFamily = 'monospace'; is.fontSize = '0.9rem'; is.color = '#ff6b6b';
        var mark = document.createElement('span');
        mark.textContent = '\u2717';
        mark.setAttribute('aria-hidden', 'true');
        var label = document.createElement('span');
        label.textContent = labels[missing[i]] || missing[i];
        item.appendChild(mark);
        item.appendChild(label);
        list.appendChild(item);
      }
      card.appendChild(list);

      var suggestion = document.createElement('p');
      suggestion.style.color = '#b0b0c8';
      suggestion.style.fontSize = '0.9rem';
      suggestion.style.lineHeight = '1.5';
      suggestion.textContent = 'Please upgrade to a modern browser such as ';
      var browsers = document.createElement('strong');
      browsers.textContent = 'Chrome 90+, Firefox 90+, or Safari 14+';
      browsers.style.color = '#00d9ff';
      suggestion.appendChild(browsers);
      suggestion.appendChild(document.createTextNode('.'));

      card.appendChild(suggestion);
      overlay.appendChild(card);
      document.body.appendChild(overlay);
      overlay.focus();
    })();
  </script>
</body>
</html>
